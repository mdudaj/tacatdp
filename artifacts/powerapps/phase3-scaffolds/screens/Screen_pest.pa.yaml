            SubmitFormula: ="Clear(colValidationSummary);
If(true && !(!IsBlank(Control_pest_dm.Text)), Collect(colValidationSummary, {Screen: ""Screen_pest"", Field: ""Direct Male Beneficiaries"", Message: ""Direct Male Beneficiaries is required."", Control: ""Control_pest_dm""}));
