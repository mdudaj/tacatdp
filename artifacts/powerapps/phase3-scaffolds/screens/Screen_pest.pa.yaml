If(true && !(!IsBlank(Control_pest_iy.Text)), Collect(colValidationSummary, {Screen: ""Screen_pest"", Field: ""Indirect Youth (18-35)"", Message: ""Indirect Youth (18-35) is required."", Control: ""Control_pest_iy""}));"
