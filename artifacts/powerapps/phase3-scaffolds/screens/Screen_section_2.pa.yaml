            SubmitFormula: ="Clear(colValidationSummary);
If(true && !(!IsBlank(Control_crop_name.Selected)), Collect(colValidationSummary, {Screen: ""Screen_section_2"", Field: ""Crop Name"", Message: ""Crop Name is required."", Control: ""Control_crop_name""}));
