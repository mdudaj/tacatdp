If(true && !(!IsBlank(Control_adaptation.Selected)), Collect(colValidationSummary, {Screen: ""Screen_section_2"", Field: ""Adaptation Rationale"", Message: ""Adaptation Rationale is required."", Control: ""Control_adaptation""}));
If(true && !(Filter(ChoicesSource, ThisRecord.technology in Control_technology.SelectedItems.Value)), Collect(colValidationSummary, {Screen: ""Screen_section_2"", Field: ""Adaptation Rationale"", Message: ""Adaptation Rationale is invalid."", Control: ""Control_adaptation""}));
If(true && !(!IsBlank(Control_additional.Selected)), Collect(colValidationSummary, {Screen: ""Screen_section_2"", Field: ""Additionality (Mitigation Co- benefit)"", Message: ""Additionality (Mitigation Co- benefit) is required."", Control: ""Control_additional""}));
