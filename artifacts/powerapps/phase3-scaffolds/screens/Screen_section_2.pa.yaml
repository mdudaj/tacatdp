If(true && !(!IsBlank(Control_sdgs.Selected)), Collect(colValidationSummary, {Screen: ""Screen_section_2"", Field: ""Applicable SDG Alignment"", Message: ""Applicable SDG Alignment is required."", Control: ""Control_sdgs""}));
If(true && !(Filter(ChoicesSource, ThisRecord.technology in Control_technology.SelectedItems.Value)), Collect(colValidationSummary, {Screen: ""Screen_section_2"", Field: ""Applicable SDG Alignment"", Message: ""Applicable SDG Alignment is invalid."", Control: ""Control_sdgs""}));"
