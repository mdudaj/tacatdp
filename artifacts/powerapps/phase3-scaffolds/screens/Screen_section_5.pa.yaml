# Phase 3 Canvas YAML screen blueprint.
# Placeholder-bound scaffold; replace placeholders with real SharePoint/Microsoft Lists data sources before publish.
Screens:
  Screen_section_5:
    Properties:
      LoadingSpinnerColor: =RGBA(0, 120, 212, 1)
    Children:
      - Screen_section_5_Shell:
          Control: Component
          ComponentName: ScreenShell
          Properties:
            TitleText: ="SECTION:5 HouseHold Number Quantification"
            ProgressText: ="Section 5"
            ShowValidationSummary: =CountRows(colValidationSummary) > 0
      - Row_001_Control_row_68:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="HouseHold Number Quantification"
            Required: =false
            HelperText: =""
            ErrorText: =""
            RowVisible: =true
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Row_002_Control_hh_male:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="Number of MALE household members"
            Required: =true
            HelperText: =""
            ErrorText: ="Connect to validation state for Control_hh_male."
            RowVisible: =true
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Row_003_Control_hh_female:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="Number of FEMALE household members"
            Required: =true
            HelperText: =""
            ErrorText: ="Connect to validation state for Control_hh_female."
            RowVisible: =true
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Row_004_Control_hh_total:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="hh total"
            Required: =false
            HelperText: =""
            ErrorText: =""
            RowVisible: =true
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Row_005_Control_hh_total_note:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="Total household members (M+F): ${hh_total}"
            Required: =false
            HelperText: =""
            ErrorText: =""
            RowVisible: =true
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Row_006_Control_hh_head_gender:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="Head of Household Gender"
            Required: =true
            HelperText: =""
            ErrorText: ="Connect to validation state for Control_hh_head_gender."
            RowVisible: =true
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Row_007_Control_women_decision:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="Are women direct decision-makers in ARA investment use?"
            Required: =true
            HelperText: =""
            ErrorText: ="Connect to validation state for Control_women_decision."
            RowVisible: =true
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Screen_section_5_ValidationSummary:
          Control: Component
          ComponentName: ValidationSummary
          Properties:
            Items: =colValidationSummary
            Visible: =CountRows(colValidationSummary) > 0
      - Screen_section_5_CommandBar:
          Control: Component
          ComponentName: CommandBar
          Properties:
            BackFormula: ="Navigate(Screen_section_4, ScreenTransition.Fade)"
            NextFormula: ="Navigate(Screen_section_6, ScreenTransition.Fade)"
            SaveDraftFormula: ="// TODO: Patch placeholder collection for draft save"
            SubmitFormula: ="Clear(colValidationSummary);
If(true && !(Self.Value >= 0), Collect(colValidationSummary, {Screen: ""Screen_section_5"", Field: ""Number of MALE household members"", Message: ""Number of MALE household members is invalid."", Control: ""Control_hh_male""}));
If(true && !(!IsBlank(Control_hh_male.Text)), Collect(colValidationSummary, {Screen: ""Screen_section_5"", Field: ""Number of MALE household members"", Message: ""Number of MALE household members is required."", Control: ""Control_hh_male""}));
If(true && !(Self.Value >= 0), Collect(colValidationSummary, {Screen: ""Screen_section_5"", Field: ""Number of FEMALE household members"", Message: ""Number of FEMALE household members is invalid."", Control: ""Control_hh_female""}));
If(true && !(!IsBlank(Control_hh_female.Text)), Collect(colValidationSummary, {Screen: ""Screen_section_5"", Field: ""Number of FEMALE household members"", Message: ""Number of FEMALE household members is required."", Control: ""Control_hh_female""}));
If(true && !(!IsBlank(Control_hh_head_gender.Selected)), Collect(colValidationSummary, {Screen: ""Screen_section_5"", Field: ""Head of Household Gender"", Message: ""Head of Household Gender is required."", Control: ""Control_hh_head_gender""}));
If(true && !(!IsBlank(Control_women_decision.Selected)), Collect(colValidationSummary, {Screen: ""Screen_section_5"", Field: ""Are women direct decision-makers in ARA investment use?"", Message: ""Are women direct decision-makers in ARA investment use? is required."", Control: ""Control_women_decision""}));"
