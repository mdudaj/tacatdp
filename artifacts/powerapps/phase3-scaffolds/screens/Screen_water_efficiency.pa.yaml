            SubmitFormula: ="Clear(colValidationSummary);
If(true && !(!IsBlank(Control_crop.Selected)), Collect(colValidationSummary, {Screen: ""Screen_water_efficiency"", Field: ""Crop Type"", Message: ""Crop Type is required."", Control: ""Control_crop""}));
If(true && !(!IsBlank(Control_area.Text)), Collect(colValidationSummary, {Screen: ""Screen_water_efficiency"", Field: ""Irrigated Area (Ha)"", Message: ""Irrigated Area (Ha) is required."", Control: ""Control_area""}));
If(true && !(!IsBlank(Control_water_tech.Selected)), Collect(colValidationSummary, {Screen: ""Screen_water_efficiency"", Field: ""Newly Adopted Sustainable Irrigation Technology"", Message: ""Newly Adopted Sustainable Irrigation Technology is required."", Control: ""Control_water_tech""}));
If(Formula.visibility_other_water_tech && !(!IsBlank(Control_other_water_tech.Text)), Collect(colValidationSummary, {Screen: ""Screen_water_efficiency"", Field: ""Other Newly Adopted Sustainable Irrigation Technology"", Message: ""Other Newly Adopted Sustainable Irrigation Technology is required."", Control: ""Control_other_water_tech""}));
If(true && !(!IsBlank(Control_irr_base.Selected)), Collect(colValidationSummary, {Screen: ""Screen_water_efficiency"", Field: ""Baseline Unsustainable Irrigation Practice to Be Replaced"", Message: ""Baseline Unsustainable Irrigation Practice to Be Replaced is required."", Control: ""Control_irr_base""}));
If(Formula.visibility_other_irr_base && !(!IsBlank(Control_other_irr_base.Text)), Collect(colValidationSummary, {Screen: ""Screen_water_efficiency"", Field: ""Other Baseline Unsustainable Irrigation Practice to Be Replaced"", Message: ""Other Baseline Unsustainable Irrigation Practice to Be Replaced is required."", Control: ""Control_other_irr_base""}));
If(true && !(!IsBlank(Control_water_base.Text)), Collect(colValidationSummary, {Screen: ""Screen_water_efficiency"", Field: ""Water Baseline (m³/year)"", Message: ""Water Baseline (m³/year) is required."", Control: ""Control_water_base""}));
If(true && !(!IsBlank(Control_water_after.Text)), Collect(colValidationSummary, {Screen: ""Screen_water_efficiency"", Field: ""Water After (m³/year)"", Message: ""Water After (m³/year) is required."", Control: ""Control_water_after""}));"
