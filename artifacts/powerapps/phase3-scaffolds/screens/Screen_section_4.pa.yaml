# Phase 3 Canvas YAML screen blueprint.
# Placeholder-bound scaffold; replace placeholders with real SharePoint/Microsoft Lists data sources before publish.
Screens:
  Screen_section_4:
    Properties:
      LoadingSpinnerColor: '=RGBA(0, 120, 212, 1)'
    Children:
      - Screen_section_4_Shell:
          Control: Component
          ComponentName: ScreenShell
          Properties:
            TitleText: '="SECTION 4: GENDER & FARMER GROUP SOCIAL INCLUSION"'
            ProgressText: '="Section 4"'
            ShowValidationSummary: '=CountRows(colValidationSummary) > 0'
      - Row_001_Control_farmer_group_member:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: '="Is farmer a member of a Farmer Group?"'
            Required: '=true'
            HelperText: '=""'
            ErrorText: '="Connect to validation state for Control_farmer_group_member."'
            RowVisible: '=true'
            DataPlaceholder: '="placeholder_tacatdp_submissions"'
            ItemsPlaceholder: '=""'
      - Row_002_Control_farmer_group_type:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: '="Farmer Group Type"'
            Required: '=true'
            HelperText: '=""'
