            SaveDraftFormula: '="// TODO: Patch placeholder collection for draft save"'
            SubmitFormula: '="Clear(colValidationSummary); If(true && !(!IsBlank(Control_farmer_group_member.Selected)), Collect(colValidationSummary, {Screen: ""Screen_section_4"", Field: ""Is farmer a member of a Farmer Group?"", Message: ""Is farmer a member of a Farmer Group? is required."", Control: ""Control_farmer_group_member""})); If(Formula.visibility_farmer_group_type && !(!IsBlank(Control_farmer_group_type.Selected)), Collect(colValidationSummary, {Screen: ""Screen_section_4"", Field: ""Farmer Group Type"", Message: ""Farmer Group Type is required."", Control: ""Control_farmer_group_type""})); If(Formula.visibility_male_members && !(Self.Value >= 0), Collect(colValidationSummary, {Screen: ""Screen_section_4"", Field: ""Male Group Members"", Message: ""Male Group Members is invalid."", Control: ""Control_male_members""})); If(Formula.visibility_male_members && !(!IsBlank(Control_male_members.Text)), Collect(colValidationSummary, {Screen: ""Screen_section_4"", Field: ""Male Group Members"", Message: ""Male Group Members is required."", Control: ""Control_male_members""})); If(Formula.visibility_female_members && !(Self.Value >= 0), Collect(colValidationSummary, {Screen: ""Screen_section_4"", Field: ""Female Group Members"", Message: ""Female Group Members is invalid."", Control: ""Control_female_members""})); If(Formula.visibility_female_members && !(!IsBlank(Control_female_members.Text)), Collect(colValidationSummary, {Screen: ""Screen_section_4"", Field: ""Female Group Members"", Message: ""Female Group Members is required."", Control: ""Control_female_members""})); If(Formula.visibility_youth_members && !(Self.Value >= 1 && Self.Value <= Control_total_members.Text), Collect(colValidationSummary, {Screen: ""Screen_section_4"", Field: ""Youth (18-35) Group Members"", Message: ""Youth (18-35) Group Members is invalid."", Control: ""Control_youth_members""})); If(Formula.visibility_youth_members && !(!IsBlank(Control_youth_members.Text)), Collect(colValidationSummary, {Screen: ""Screen_section_4"", Field: ""Youth (18-35) Group Members"", Message: ""Youth (18-35) Group Members is required."", Control: ""Control_youth_members""}));"'
