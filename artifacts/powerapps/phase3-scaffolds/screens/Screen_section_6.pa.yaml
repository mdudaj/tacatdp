# Phase 3 Canvas YAML screen blueprint.
# Placeholder-bound scaffold; replace placeholders with real SharePoint/Microsoft Lists data sources before publish.
Screens:
  Screen_section_6:
    Properties:
      LoadingSpinnerColor: =RGBA(0, 120, 212, 1)
    Children:
      - Screen_section_6_Shell:
          Control: Component
          ComponentName: ScreenShell
          Properties:
            TitleText: ="SECTION: 6 ARA‑CSA TRAINING & Gender Action Plan"
            ProgressText: ="Section 6"
            ShowValidationSummary: =CountRows(colValidationSummary) > 0
      - Row_001_Control_row_77:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="Adaptataion and CSA training and Gender Action Plan"
            Required: =false
            HelperText: =""
            ErrorText: =""
            RowVisible: =true
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Row_002_Control_ara_training:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="Did individual or farmer group receive ARA training?"
            Required: =true
            HelperText: =""
            ErrorText: ="Connect to validation state for Control_ara_training."
            RowVisible: =true
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Row_003_Control_training_type:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="Type of Training Received"
            Required: =true
            HelperText: =""
            ErrorText: ="Connect to validation state for Control_training_type."
            RowVisible: =Formula.visibility_training_type
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Row_004_Control_target_group:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="Target Groups Covered"
            Required: =true
            HelperText: =""
            ErrorText: ="Connect to validation state for Control_target_group."
            RowVisible: =Formula.visibility_target_group
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Row_005_Control_male_trained:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="Number of MALE farmers trained"
            Required: =true
            HelperText: =""
            ErrorText: ="Connect to validation state for Control_male_trained."
            RowVisible: =Formula.visibility_male_trained
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Row_006_Control_female_trained:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="Number of FEMALE farmers trained"
            Required: =true
            HelperText: =""
            ErrorText: ="Connect to validation state for Control_female_trained."
            RowVisible: =Formula.visibility_female_trained
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Row_007_Control_total_trained:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="total trained"
            Required: =false
            HelperText: =""
            ErrorText: =""
            RowVisible: =true
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Row_008_Control_total_trained_note:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="Total farmers trained (M+F): ${total_trained}"
            Required: =false
            HelperText: =""
            ErrorText: =""
            RowVisible: =Formula.visibility_total_trained_note
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Row_009_Control_gender_content:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="Was gender-responsive content included?"
            Required: =true
            HelperText: =""
            ErrorText: ="Connect to validation state for Control_gender_content."
            RowVisible: =Formula.visibility_gender_content
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Row_010_Control_gender_focus:
          Control: Component
          ComponentName: FieldRow
          Properties:
            LabelText: ="Brief gender focus description"
            Required: =true
            HelperText: =""
            ErrorText: ="Connect to validation state for Control_gender_focus."
            RowVisible: =Formula.visibility_gender_focus
            DataPlaceholder: ="placeholder_tacatdp_submissions"
            ItemsPlaceholder: =""
      - Screen_section_6_ValidationSummary:
          Control: Component
          ComponentName: ValidationSummary
          Properties:
            Items: =colValidationSummary
            Visible: =CountRows(colValidationSummary) > 0
      - Screen_section_6_CommandBar:
          Control: Component
          ComponentName: CommandBar
          Properties:
            BackFormula: ="Navigate(Screen_section_5, ScreenTransition.Fade)"
            NextFormula: ="Navigate(Screen_section_7, ScreenTransition.Fade)"
            SaveDraftFormula: ="// TODO: Patch placeholder collection for draft save"
            SubmitFormula: ="Clear(colValidationSummary);
If(true && !(!IsBlank(Control_ara_training.Selected)), Collect(colValidationSummary, {Screen: ""Screen_section_6"", Field: ""Did individual or farmer group receive ARA training?"", Message: ""Did individual or farmer group receive ARA training? is required."", Control: ""Control_ara_training""}));
If(Formula.visibility_training_type && !(!IsBlank(Control_training_type.Selected)), Collect(colValidationSummary, {Screen: ""Screen_section_6"", Field: ""Type of Training Received"", Message: ""Type of Training Received is required."", Control: ""Control_training_type""}));
If(Formula.visibility_target_group && !(CountRows(Self.SelectedItems) >= 1), Collect(colValidationSummary, {Screen: ""Screen_section_6"", Field: ""Target Groups Covered"", Message: ""Target Groups Covered is invalid."", Control: ""Control_target_group""}));
If(Formula.visibility_target_group && !(!IsBlank(Control_target_group.Selected)), Collect(colValidationSummary, {Screen: ""Screen_section_6"", Field: ""Target Groups Covered"", Message: ""Target Groups Covered is required."", Control: ""Control_target_group""}));
If(Formula.visibility_male_trained && !(Self.Value >= 0), Collect(colValidationSummary, {Screen: ""Screen_section_6"", Field: ""Number of MALE farmers trained"", Message: ""Number of MALE farmers trained is invalid."", Control: ""Control_male_trained""}));
If(Formula.visibility_male_trained && !(!IsBlank(Control_male_trained.Text)), Collect(colValidationSummary, {Screen: ""Screen_section_6"", Field: ""Number of MALE farmers trained"", Message: ""Number of MALE farmers trained is required."", Control: ""Control_male_trained""}));
If(Formula.visibility_female_trained && !(Self.Value >= 0), Collect(colValidationSummary, {Screen: ""Screen_section_6"", Field: ""Number of FEMALE farmers trained"", Message: ""Number of FEMALE farmers trained is invalid."", Control: ""Control_female_trained""}));
If(Formula.visibility_female_trained && !(!IsBlank(Control_female_trained.Text)), Collect(colValidationSummary, {Screen: ""Screen_section_6"", Field: ""Number of FEMALE farmers trained"", Message: ""Number of FEMALE farmers trained is required."", Control: ""Control_female_trained""}));
If(Formula.visibility_gender_content && !(!IsBlank(Control_gender_content.Selected)), Collect(colValidationSummary, {Screen: ""Screen_section_6"", Field: ""Was gender-responsive content included?"", Message: ""Was gender-responsive content included? is required."", Control: ""Control_gender_content""}));
If(Formula.visibility_gender_focus && !(!IsBlank(Control_gender_focus.Selected)), Collect(colValidationSummary, {Screen: ""Screen_section_6"", Field: ""Brief gender focus description"", Message: ""Brief gender focus description is required."", Control: ""Control_gender_focus""}));"
