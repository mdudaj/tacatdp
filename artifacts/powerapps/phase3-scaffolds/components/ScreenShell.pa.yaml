# Phase 3 Canvas YAML component blueprint.
# Use as a maker reference; validate in Power Apps Studio before import or publish.
ComponentDefinitions:
  ScreenShell:
    DefinitionType: CanvasComponent
    Description: "Reusable screen wrapper for section title, progress, scrollable content, validation summary, and command bar."
    CustomProperties:
      TitleText:
        PropertyKind: Input
        DisplayName: "TitleText"
        DataType: Text
      ProgressText:
        PropertyKind: Input
        DisplayName: "ProgressText"
        DataType: Text
      ShowValidationSummary:
        PropertyKind: Input
        DisplayName: "ShowValidationSummary"
        DataType: Text
    Children:
      - RootContainer:
          Control: GroupContainer@1.3.0
          Variant: AutoLayout
          Properties:
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =4
            PaddingLeft: =0
            PaddingRight: =0
            PaddingTop: =0
            PaddingBottom: =0
