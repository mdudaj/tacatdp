), Collect(colValidationSummary, {Screen: ""Screen_main"", Field: ""Ward"", Message: ""Ward is invalid."", Control: ""Control_ward""})); If(true && !(!IsBlank(Control_village.Selected)), Collect(colValidationSummary, {Screen: ""Screen_main"", Field: ""Village"", Message: ""Village is required."", Control: ""Control_village""})); If(true && !(Filter(ChoicesSource, region=Control_region.Selected.Value && district=Control_district.Selected.Value && ward=Control_ward.Selected.Value)), Collect(colValidationSummary, {Screen: ""Screen_main"", Field: ""Village"", Message: ""Village is invalid."", Control: ""Control_village""})); If(true && !((IsMatch(Text(Self.Value), \""0\d{9}\"") && Len(Text(Self.Value))=10) || Self.Value=-444 || Self.Value=-888), Collect(colValidationSummary, {Screen: ""Screen_main"", Field: ""Farmer Phone"", Message: ""Insert a 10-digit number including the zero in the beginning!"", Control: ""Control_farmer_phone""})); If(true && !(!IsBlank(Control_farmer_phone.Text)), Collect(colValidationSummary, {Screen: ""Screen_main"", Field: ""Farmer Phone"", Message: ""Farmer Phone is required."", Control: ""Control_farmer_phone""})); If(true && !(Self.Value >= 200000), Collect(colValidationSummary, {Screen: ""Screen_main"", Field: ""Loan Amount (TZS)"", Message: ""Kiasi cha mkopo lazima kiwe TZS 200,000 au zaidi."", Control: ""Control_loan_amount_tzs""})); If(true && !(!IsBlank(Control_loan_amount_tzs.Text)), Collect(colValidationSummary, {Screen: ""Screen_main"", Field: ""Loan Amount (TZS)"", Message: ""Loan Amount (TZS) is required."", Control: ""Control_loan_amount_tzs""})); If(true && !(!IsBlank(Control_farmer_segment_note.Text)), Collect(colValidationSummary, {Screen: ""Screen_main"", Field: ""Farmer Segment ${farmer_segment}"", Message: ""Farmer Segment ${farmer_segment} is required."", Control: ""Control_farmer_segment_note""})); If(true && !(!IsBlank(Control_own_farmland.Selected)), Collect(colValidationSummary, {Screen: ""Screen_main"", Field: ""Farmer/House Hold Own Farmland?"", Message: ""Farmer/House Hold Own Farmland? is required."", Control: ""Control_own_farmland""})); If(true && !(!IsBlank(Control_land_size_acres.Text)), Collect(colValidationSummary, {Screen: ""Screen_main"", Field: ""Land Size (Acres)"", Message: ""Land Size (Acres) is required."", Control: ""Control_land_size_acres""})); If(true && !(!IsBlank(Control_quantify_cost.Selected)), Collect(colValidationSummary, {Screen: ""Screen_main"", Field: ""Would you like to quantify production cost and income?"", Message: ""Would you like to quantify production cost and income? is required."", Control: ""Control_quantify_cost""}));"'
