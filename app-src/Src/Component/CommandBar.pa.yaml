# Phase 3 Canvas YAML component blueprint.
# Use as a maker reference; validate in Power Apps Studio before import or publish.
ComponentDefinitions:
  CommandBar:
    DefinitionType: CanvasComponent
    Description: "Consistent Back, Next, Save Draft, and Submit actions."
    CustomProperties:
      BackFormula:
        PropertyKind: Input
        DisplayName: "BackFormula"
        DataType: Text
      NextFormula:
        PropertyKind: Input
        DisplayName: "NextFormula"
        DataType: Text
      SaveDraftFormula:
        PropertyKind: Input
        DisplayName: "SaveDraftFormula"
        DataType: Text
      SubmitFormula:
        PropertyKind: Input
        DisplayName: "SubmitFormula"
        DataType: Text
    Children:
      - CommandBarRootContainer:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            LayoutDirection: '=LayoutDirection.Vertical'
            LayoutGap: '=4'
            PaddingLeft: '=0'
            PaddingRight: '=0'
            PaddingTop: '=0'
            PaddingBottom: '=0'
