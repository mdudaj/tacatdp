# Phase 3 Canvas YAML component blueprint.
# Use as a maker reference; validate in Power Apps Studio before import or publish.
ComponentDefinitions:
  FieldRow:
    DefinitionType: CanvasComponent
    Description: "One field per row with visible label, input, helper text, and error text."
    CustomProperties:
      LabelText:
        PropertyKind: Input
        DisplayName: "LabelText"
        DataType: Text
      Required:
        PropertyKind: Input
        DisplayName: "Required"
        DataType: Text
      HelperText:
        PropertyKind: Input
        DisplayName: "HelperText"
        DataType: Text
      ErrorText:
        PropertyKind: Input
        DisplayName: "ErrorText"
        DataType: Text
      RowVisible:
        PropertyKind: Input
        DisplayName: "RowVisible"
        DataType: Text
      DataPlaceholder:
        PropertyKind: Input
        DisplayName: "DataPlaceholder"
        DataType: Text
      ItemsPlaceholder:
        PropertyKind: Input
        DisplayName: "ItemsPlaceholder"
        DataType: Text
    Children:
      - FieldRowRootContainer:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            LayoutDirection: '=LayoutDirection.Vertical'
            LayoutGap: '=4'
            PaddingLeft: '=0'
            PaddingRight: '=0'
            PaddingTop: '=0'
            PaddingBottom: '=0'
