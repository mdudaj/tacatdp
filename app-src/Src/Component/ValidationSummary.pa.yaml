# Phase 3 Canvas YAML component blueprint.
# Use as a maker reference; validate in Power Apps Studio before import or publish.
ComponentDefinitions:
  ValidationSummary:
    DefinitionType: CanvasComponent
    Description: "Screen-level validation summary bound to colValidationSummary."
    CustomProperties:
      Items:
        PropertyKind: Input
        DisplayName: "Items"
        DataType: Table
      Visible:
        PropertyKind: Input
        DisplayName: "Visible"
        DataType: Boolean
    Children:
      - ValidationSummaryRootContainer:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            LayoutDirection: '=LayoutDirection.Vertical'
            LayoutGap: '=4'
            PaddingLeft: '=0'
            PaddingRight: '=0'
            PaddingTop: '=0'
            PaddingBottom: '=0'
